site:
  name: Fechadura Biométrica
  site: 'https://www.fechadurabiometrica.com.br'
  base: '/'
  trailingSlash: false

  googleSiteVerificationId: 0j-R-haa1TrousLf4z3J-K7992ZqExe2kG3gEoWLT4E # Google Search Console Verification

# Default SEO metadata
metadata:
  title:
    default: Fechadura Biométrica - Tudo sobre Fechaduras Digitais
    template: '%s — Fechadura Biométrica'
  description: "Reviews, comparativos e guias definitivos sobre as melhores fechaduras digitais, biométricas e eletrônicas do mercado atual."
  robots:
    index: true
    follow: true
  openGraph:
    site_name: Fechadura Biométrica
    images:
      - url: '~/assets/images/default.png'
        width: 1200
        height: 628
    type: website
  twitter:
    handle: '@arthelokyo'
    site: '@arthelokyo'
    cardType: summary_large_image

i18n:
  language: pt-br
  textDirection: ltr

apps:
  blog:
    isEnabled: true
    postsPerPage: 6

    post:
      isEnabled: true
      permalink: '/%slug%' # Variables: %slug%, %year%, %month%, %day%, %hour%, %minute%, %second%, %category%
      robots:
        index: true

    list:
      isEnabled: true
      pathname: 'blog' # Blog main path, you can change this to "articles" (/articles)
      robots:
        index: true

    category:
      isEnabled: true
      pathname: 'category' # Category main path /category/some-category, you can change this to "group" (/group/some-category)
      robots:
        index: true

    tag:
      isEnabled: true
      pathname: 'tag' # Tag main path /tag/some-tag, you can change this to "topics" (/topics/some-category)
      robots:
        index: false

    isRelatedPostsEnabled: true
    relatedPostsCount: 4

analytics:
  vendors:
    googleAnalytics:
      id: null # or "G-XXXXXXXXXX"

ui:
  theme: 'system' # Values: "system" | "light" | "dark" | "light:only" | "dark:only"
